sudo: required
services: 
 - docker

before_install:
 - docker build -t oludolamu/docker-react -f dockerfile.dev .
 
script: 
 - docker run -e CI=true oludolamu/docker-react npm run test

####### instructions for travis to deploy to beanstalk
deploy:
  provider: elasticbeanstalk
  region: eu-north-1
  app: docker-react
  env: Docker-react-env
  bucket_name: elasticbeanstalk-eu-north-1-923884398765
  bucket_path: docker-react
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: "$AWS_SECRET_KEY"